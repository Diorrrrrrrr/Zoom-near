name: zoomnear
description: "주니어 - 우리 동네 즐거운 만남"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3
  share_plus: ^12.0.2
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0
  jwt_decoder: ^2.0.1
  intl: ^0.19.0
  equatable: ^2.0.5
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Pretendard 폰트는 assets/fonts/ 에 .otf 배치 후 아래 fonts: 블록 활성화

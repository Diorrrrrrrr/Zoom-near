services:
  postgres:
    image: postgres:16-alpine
    container_name: zoomnear-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zoomnear
      POSTGRES_USER: zoomnear
      POSTGRES_PASSWORD: zoomnear
    volumes:
      - zoomnear-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoomnear -d zoomnear"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  zoomnear-pg-data:
